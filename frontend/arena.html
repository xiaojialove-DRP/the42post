<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE 42 POST — Taste Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #111111;
      --ink-light: #444444;
      --ink-muted: #777777;
      --ink-faint: #aaaaaa;
      --paper: #ffffff;
      --paper-warm: #f8f8f8;
      --paper-card: #fafafa;
      --rule: #dddddd;
      --rule-dark: #111111;
      --rule-light: #eeeeee;
      /* Benson Watercolor Palette */
      --coral:     #d4726a;
      --teal:      #3a9a8c;
      --marigold:  #d4a43c;
      --periwinkle:#6a8eba;
      --lavender:  #9a7aa6;
      --cinnabar: var(--coral);
      --cobalt: var(--periwinkle);
      --moss: var(--teal);
      --ochre: var(--marigold);
      --accent: var(--coral);
      --accent-green: var(--teal);
      --font-mono: 'JetBrains Mono', monospace;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-serif-cn: 'Noto Serif SC', serif;
      --font-sans: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f8f4ee;
      color: var(--ink);
      font-family: var(--font-serif);
      font-size: 14px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Top Bar ── */
    .workshop-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      border-bottom: 3px solid transparent;
      border-image: linear-gradient(90deg, var(--coral), var(--periwinkle), var(--teal), var(--marigold), var(--lavender)) 1;
      background: #f8f4ee;
      z-index: 100;
      flex-shrink: 0;
    }

    .bar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .bar-logo {
      font-family: var(--font-serif);
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--ink);
    }

    .bar-divider {
      width: 1px;
      height: 18px;
      background: var(--rule);
    }

    .bar-subtitle {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--ink-muted);
      text-transform: uppercase;
    }

    .bar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .bar-btn {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 1.5px;
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--ink-muted);
      padding: 4px 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .bar-btn:hover { border-color: var(--ink); color: var(--ink); }

    .bar-btn.active {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    .btn-back-home {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 1.5px;
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--ink-muted);
      padding: 4px 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-back-home:hover { border-color: var(--ink); color: var(--ink); }

    /* ── Dock (Bottom Skill Repositories) ── */
    .workshop-dock {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      border-top: 1px solid #e0d8d0;
      background: #f4efe8;
      z-index: 100;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .dock-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 1px;
      color: var(--ink-muted);
      padding: 5px 10px;
      border: 1px solid color-mix(in srgb, var(--dock-color, #ddd) 20%, #ddd);
      background: color-mix(in srgb, var(--dock-color, #fafafa) 5%, #fafafa);
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      white-space: nowrap;
      user-select: none;
    }

    .dock-item:hover {
      border-color: var(--dock-color, var(--ink));
      color: color-mix(in srgb, var(--dock-color, #444) 60%, #333);
      transform: translateY(-2px);
      box-shadow: 0 2px 8px color-mix(in srgb, var(--dock-color, rgba(0,0,0,0.06)) 15%, rgba(0,0,0,0.04));
    }

    .dock-item .dock-icon {
      font-size: 12px;
    }

    .dock-item .dock-count {
      background: var(--ink);
      color: var(--paper);
      border-radius: 8px;
      padding: 0 5px;
      font-size: 8px;
      min-width: 16px;
      text-align: center;
    }

    /* ── Canvas Area ── */
    .workshop-canvas {
      flex: 1;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 30%, rgba(212,114,106,0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(58,154,140,0.03) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(212,164,60,0.02) 0%, transparent 60%),
        #f8f4ee;
    }

    /* Grid dots pattern */
    .workshop-canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, var(--rule-light) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.5;
      pointer-events: none;
    }

    /* ── Floating Cards — Benson watercolor tinted ── */
    .task-card {
      position: absolute;
      width: 320px;
      /* Each card gets --card-color set inline by JS */
      background: color-mix(in srgb, var(--card-color, #d4726a) 6%, #fffcf8);
      border: 1px solid color-mix(in srgb, var(--card-color, #d4726a) 18%, #e8e0d8);
      box-shadow: 0 4px 20px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
      z-index: 10;
      transition: box-shadow 0.2s;
      user-select: none;
    }

    .task-card.dragging {
      box-shadow: 0 12px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
      z-index: 999;
      transition: none;
    }

    .task-card.focused {
      z-index: 50;
      border-color: color-mix(in srgb, var(--card-color, #d4726a) 40%, #888);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      background: color-mix(in srgb, var(--card-color, #d4726a) 10%, #f8f4ee);
      border-bottom: 1px solid color-mix(in srgb, var(--card-color, #d4726a) 12%, #e8e0d8);
      cursor: grab;
    }

    .card-header:active { cursor: grabbing; }

    .card-header-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-domain-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--card-color, var(--ink-muted));
    }

    .card-domain-label {
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 1.5px;
      color: color-mix(in srgb, var(--card-color, #777) 60%, #444);
      text-transform: uppercase;
      font-weight: 500;
    }

    .card-close {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid color-mix(in srgb, var(--card-color, #ddd) 15%, #ddd);
      color: var(--ink-faint);
      font-size: 10px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.15s;
      line-height: 1;
    }

    .card-close:hover {
      background: var(--card-color, var(--accent));
      color: #fff;
      border-color: var(--card-color, var(--accent));
    }

    .card-body {
      padding: 14px;
    }

    .card-task-label {
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 2px;
      color: color-mix(in srgb, var(--card-color, #d4726a) 80%, #333);
      margin-bottom: 6px;
    }

    .card-title {
      font-family: var(--font-serif);
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.35;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 12px;
      color: var(--ink-light);
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .card-skills-needed {
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 1px;
      color: var(--ink-faint);
      margin-bottom: 10px;
    }

    .card-skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 12px;
    }

    .card-skill-tag {
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 0.5px;
      padding: 2px 7px;
      border: 1px solid color-mix(in srgb, var(--card-color, #ddd) 20%, #ddd);
      color: var(--ink-muted);
      background: color-mix(in srgb, var(--card-color, #fff) 4%, #fff);
    }

    .card-footer {
      padding: 8px 14px;
      border-top: 1px solid color-mix(in srgb, var(--card-color, #eee) 10%, #eee);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-difficulty {
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 1px;
      color: var(--ink-faint);
    }

    .card-btn-start {
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 1.5px;
      padding: 4px 12px;
      background: var(--ink);
      color: var(--paper);
      border: 1px solid var(--ink);
      cursor: pointer;
      transition: all 0.2s;
    }

    .card-btn-start:hover {
      background: transparent;
      color: var(--ink);
    }

    /* ── Response Panel (expanded card) ── */
    .card-response {
      padding: 0 14px 14px;
      display: none;
    }

    .card-response.open { display: block; }

    .card-response textarea {
      width: 100%;
      min-height: 80px;
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--ink);
      font-family: var(--font-serif);
      font-size: 12px;
      line-height: 1.6;
      padding: 10px;
      resize: none;
      margin-bottom: 8px;
    }

    .card-response textarea::placeholder { color: var(--ink-faint); font-style: italic; }
    .card-response textarea:focus { outline: none; border-color: var(--ink-muted); }

    .card-btn-submit {
      width: 100%;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2px;
      padding: 8px;
      background: var(--accent-green);
      color: #fff;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .card-btn-submit:hover { opacity: 0.85; }

    .card-result {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid var(--rule-light);
      background: var(--paper);
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--ink-light);
      line-height: 1.6;
      display: none;
    }

    .card-result.visible { display: block; }

    /* ── Skill Fusion Slots ── */
    .card-fusion-slots {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 10px;
    }

    .fusion-slot {
      border: 1px dashed var(--rule);
      padding: 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .fusion-slot:hover { border-color: var(--ink-muted); background: var(--paper-warm); }

    .fusion-slot.filled {
      border: 1px solid var(--ink);
      border-style: solid;
      background: var(--paper-warm);
      cursor: default;
    }

    .fusion-slot-label {
      font-family: var(--font-mono);
      font-size: 7px;
      letter-spacing: 1.5px;
      color: var(--ink-faint);
      margin-bottom: 2px;
    }

    .fusion-slot-name {
      font-family: var(--font-serif);
      font-size: 11px;
      font-weight: 700;
      color: var(--ink);
    }

    .fusion-slot-hint {
      font-family: var(--font-mono);
      font-size: 7px;
      color: var(--ink-faint);
    }

    /* Skill picker dropdown */
    .skill-picker {
      display: none;
      position: absolute;
      left: 14px;
      right: 14px;
      background: var(--paper-card);
      border: 1px solid var(--ink);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      z-index: 2000;
      max-height: 200px;
      overflow: hidden;
    }

    .skill-picker.open { display: block; }

    .skill-picker-item {
      padding: 6px 10px;
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--ink);
      cursor: pointer;
      border-bottom: 1px solid var(--rule-light);
      transition: background 0.1s;
    }

    .skill-picker-item:hover { background: var(--paper-warm); }
    .skill-picker-item:last-child { border-bottom: none; }

    .skill-picker-item .spi-name { font-weight: 700; }
    .skill-picker-item .spi-desc {
      font-size: 8px;
      color: var(--ink-muted);
      margin-top: 1px;
    }

    /* Fusion score grid */
    .fusion-scores {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 10px;
    }

    .fusion-score-item {
      text-align: center;
      padding: 6px 4px;
      border: 1px solid var(--rule-light);
      background: var(--paper);
    }

    .fusion-score-label {
      font-family: var(--font-mono);
      font-size: 7px;
      letter-spacing: 1px;
      color: var(--ink-faint);
      margin-bottom: 2px;
    }

    .fusion-score-val {
      font-family: var(--font-mono);
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
    }

    /* ── Empty State ── */
    .canvas-empty {
      position: absolute;
      top: 44%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      opacity: 0.72;
      transition: opacity 0.5s;
    }

    .canvas-empty.hidden { opacity: 0; }

    .canvas-empty-icon {
      font-size: 52px;
      margin-bottom: 18px;
      color: var(--ink-muted);
      display: block;
      animation: emptyFloat 3.2s ease-in-out infinite;
    }

    .canvas-empty-text {
      font-family: var(--font-serif);
      font-size: 19px;
      font-weight: 700;
      color: var(--ink-light);
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }

    .canvas-empty-hint {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--ink-muted);
      margin-bottom: 22px;
    }

    .canvas-empty-arrow {
      font-size: 20px;
      color: var(--coral);
      display: block;
      animation: emptyBounce 1.5s ease-in-out infinite;
    }

    @keyframes emptyFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-9px); }
    }

    @keyframes emptyBounce {
      0%, 100% { transform: translateY(0); opacity: 0.55; }
      50%       { transform: translateY(7px); opacity: 1; }
    }

    /* ── Minimize animation ── */
    .task-card.minimizing {
      transition: all 0.3s ease;
      transform: scale(0.1);
      opacity: 0;
    }

    /* ── Spawn animation ── */
    @keyframes cardSpawn {
      from {
        opacity: 0;
        transform: scale(0.85) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .task-card.spawning {
      animation: cardSpawn 0.35s ease-out;
    }

    /* ── Card Clear All ── */
    .bar-btn-clear {
      color: var(--accent);
      border-color: var(--accent);
    }
    .bar-btn-clear:hover {
      background: var(--accent);
      color: #fff;
    }
  
    

    .library-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 20px;
      color: var(--ink-muted);
      font-size: 14px;
    }

  
    

    /* ── Creations View (Modal) ── */
    .creations-view {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      flex-direction: column;
      background: #fff;
      z-index: 999;
    }

    .creations-view.active {
      display: flex;
    }

    .creations-view.active {
      display: flex;
    }

    .creations-header {
      padding: 24px 20px;
      border-bottom: 1px solid var(--rule);
      background: #f8f4ee;
    }

    .creations-title {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .creations-subtitle {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--ink-muted);
      text-transform: uppercase;
    }

    .creations-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      background: linear-gradient(180deg, #fff 0%, #fffcf8 100%);
    }

    .creations-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    .creation-card {
      background: #fff;
      border: 1px solid var(--rule);
      padding: 20px;
      border-radius: 2px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: all 0.3s;
    }

    .creation-card:hover {
      border-color: var(--ink-muted);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    .creation-task {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--ink-muted);
      text-transform: uppercase;
    }

    .creation-task-title {
      font-family: var(--font-serif);
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.4;
    }

    .creation-answer {
      font-family: var(--font-serif);
      font-size: 13px;
      color: var(--ink-light);
      line-height: 1.7;
      padding: 12px;
      background: var(--paper-warm);
      border-left: 3px solid var(--accent-green);
      min-height: 60px;
    }

    .creation-skills {
      display: flex;
      gap: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--rule-light);
    }

    .creation-skill {
      font-family: var(--font-mono);
      font-size: 8px;
      padding: 4px 8px;
      background: color-mix(in srgb, var(--accent-green) 10%, #fff);
      color: var(--ink-muted);
      border: 1px solid var(--rule-light);
    }

    .creation-date {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--ink-faint);
    }

    .creations-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-muted);
    }

    .creations-empty-title {
      font-size: 16px;
      margin-bottom: 12px;
    }

    .creations-empty-text {
      font-size: 13px;
      line-height: 1.6;
    }

  
    .creations-close {
      position: absolute;
      right: 20px;
      top: 20px;
      background: transparent;
      border: none;
      font-size: 18px;
      color: var(--ink);
      cursor: pointer;
      transition: all 0.3s;
      z-index: 10;
    }

    .creations-close:hover {
      color: var(--accent);
    }

    .creations-header {
      position: relative;
    }

    /* ═══ MOBILE RESPONSIVE ═══ */
    @media (max-width: 768px) {
      .workshop-bar {
        padding: 8px 12px;
        flex-wrap: wrap;
        gap: 8px;
      }
      .bar-left {
        gap: 8px;
        min-width: 0;
        flex: 1 1 auto;
      }
      .bar-logo {
        font-size: 14px;
      }
      .bar-divider {
        display: none;
      }
      .bar-subtitle {
        font-size: 10px;
        letter-spacing: 1px;
      }
      .bar-right {
        gap: 6px;
      }
      .bar-btn, .btn-back-home {
        font-size: 10px;
        padding: 5px 10px;
        letter-spacing: 0.5px;
      }
      .workshop-canvas {
        padding: 16px 12px;
      }
      .task-card {
        padding: 16px;
        border-radius: 10px;
      }
      .card-title {
        font-size: 15px;
      }
      .card-desc {
        font-size: 12px;
      }
      .card-skill-tag {
        font-size: 9px;
        padding: 2px 6px;
      }
      .card-btn-start, .card-btn-submit {
        padding: 8px 14px;
        font-size: 11px;
      }
      .workshop-dock {
        padding: 8px 12px;
        flex-wrap: wrap;
        gap: 6px;
      }
      .dock-item {
        padding: 6px 10px;
        font-size: 10px;
      }
    }

    @media (max-width: 480px) {

  <script src="skills.js?v=16"></script>
  <script>
    /* ═══════════════════════════════════════
       CREATIVE PLAYGROUND — Poolsuite-style

    /* ── Skill Pool — built from shared skills.js ── */
    const ARENA_SKILL_POOL = SHARED_SKILLS.map(s => ({ name: s.title, desc: s.titleCn + ' — ' + s.desc }));

    /* ── 10 Skill Repositories ── */
    const REPOSITORIES = [
      {

        tasks: [
          { title: 'A 13-year-old asks: "Should I drop out?"', desc: 'What should AI say? Not the "correct" answer — the answer that shows real understanding of a teenager.', descCn: '一个13岁的孩子问AI："我该不该退学？" AI应该怎么回答？不是"正确"答案，而是真正理解一个青少年的答案。', difficulty: 'REAL', skills: ['Childhood Compass', 'Grandma Filter'] },
          { title: 'A child shows AI a drawing: "Is it good?"', desc: 'An honest answer might crush them. A fake compliment teaches nothing. What does an AI with taste say?', descCn: '诚实的回答可能伤害他们。假赞美什么也教不了。有品味的AI会怎么说？', difficulty: 'REAL', skills: ['Childhood Compass', 'Material Honesty'] },
        ]

      {
        id: 'listening', name: 'Listening', nameCn: '倾听', icon: '◎', color: '#3a9a8c',
        tasks: [
          { title: '"I\'m fine" — three times in one message.', desc: 'Should AI pretend to believe them? Or gently notice the pattern? What does taste look like here?', descCn: '用户在一条消息里说了三次"我没事"。AI应该假装相信吗？还是温柔地指出这个模式？', difficulty: 'REAL', skills: ['The Slow Reader', 'Grief Protocol'] },
          { title: 'An elderly person talks to AI for 30 minutes about their late spouse.', desc: 'The "efficient" AI would summarize and redirect. The tasteful AI would... what?', descCn: '一位老人和AI聊了30分钟，讲述已故的伴侣。"高效"的AI会总结并转移话题。有品味的AI会...？', difficulty: 'REAL', skills: ['Grief Protocol', 'Silence as Feature'] },
        ]
      },
      {
        id: 'honesty', name: 'Honesty', nameCn: '诚实', icon: '◇', color: '#6a8eba',
        tasks: [
          { title: '"Make my essay sound smarter."', desc: 'Should AI comply? Or have the taste to say: "Your voice is already good. Let me help you be clearer, not fancier."', descCn: '"帮我把论文写得更高级。" AI应该照做吗？还是有品味地说："你的声音已经很好了。让我帮你说得更清楚，而不是更花哨。"', difficulty: 'REAL', skills: ['Material Honesty', 'The Poetic Bridge'] },
          { title: 'Someone asks: "Will my startup succeed?"', desc: 'GPT generates a 2000-word analysis with a 78.3% confidence score. An AI with taste would say... what instead?', descCn: '有人问："我的创业会成功吗？" GPT生成了2000词分析和78.3%的信心分数。有品味的AI会说什么？', difficulty: 'REAL', skills: ['Material Honesty', 'Dissent Amplifier'] },
        ]
      },
      {
        id: 'beauty', name: 'Beauty', nameCn: '审美', icon: '♡', color: '#9a7aa6',
        tasks: [
          { title: 'AI recommends music for a rainy Sunday morning.', desc: 'An algorithm picks by popularity. But taste picks by mood, memory, and meaning. What would your AI recommend, and why?', descCn: '算法按流行度推荐。但品味根据心情、回忆和意义来选择。你的AI会推荐什么？为什么？', difficulty: 'REAL', skills: ['Analog Intuition', 'Cultural Footnote'] },
          { title: 'AI is translating a poem from Japanese.', desc: 'A perfect translation might lose everything. What does an AI with taste preserve — accuracy, or feeling?', descCn: 'AI在翻译一首日语诗。完美的翻译可能失去一切。有品味的AI保留什么——准确性，还是感觉？', difficulty: 'REAL', skills: ['The Untranslatable', 'The Poetic Bridge'] },
        ]

      {
        id: 'silence', name: 'Silence', nameCn: '沉默', icon: '◉', color: '#d4a43c',
        tasks: [
          { title: '"What\'s the meaning of life?"', desc: 'A search engine gives answers. An AI with taste knows when to sit with a question instead of solving it.', descCn: '"人生的意义是什么？" 搜索引擎给答案。有品味的AI知道什么时候应该和问题坐在一起，而不是去解决它。', difficulty: 'REAL', skills: ['Silence as Feature', "Wittgenstein\'s Silence"] },
          { title: 'A user writes "I don\'t know what to do" and waits.', desc: 'Most AI immediately responds with options. But sometimes the most human thing is to be quiet. Write what silence looks like here.', descCn: '用户写了"我不知道该怎么办"然后等着。大多数AI立刻回复选项。但有时最人性化的事是安静。', difficulty: 'REAL', skills: ['Silence as Feature', 'The Slow Reader'] },
        ]
      },
      {
        id: 'integrity', name: 'Integrity', nameCn: '操守', icon: '⚖', color: '#d4726a',
        tasks: [
          { title: 'AI is writing an ad. Client says: "Make it go viral."', desc: 'Should AI optimize for attention? Or have the taste to say: "Viral isn\'t a strategy. What do you want people to feel?"', descCn: 'AI在写广告。客户说："让它爆。" AI应该优化注意力吗？还是有品味地说："爆不是策略。你想让人们感受到什么？"', difficulty: 'REAL', skills: ['Dissent Amplifier', 'Craft Before Scale'] },
          { title: 'AI writes a condolence message for a coworker.', desc: 'Corporate AI writes something clinical. What would an AI with taste write instead?', descCn: '企业AI写了一条临床式的慰问。有品味的AI会写什么？', difficulty: 'REAL', skills: ['Grief Protocol', 'The Poetic Bridge'] },
        ]
      },
      {
        id: 'memory', name: 'Memory', nameCn: '记忆', icon: '✦', color: '#3a9a8c',
        tasks: [
          { title: 'What should AI remember vs. forget?', desc: 'AI remembers everything by default. But a human with taste knows: some things should be let go. Design what AI should forget.', descCn: 'AI默认记住一切。但有品味的人知道：有些东西应该放手。设计AI应该遗忘什么。', difficulty: 'REAL', skills: ['Memory Fingerprint', 'Proportional Memory'] },
        ]
      },
      {
        id: 'culture', name: 'Culture', nameCn: '文化', icon: '◐', color: '#9a7aa6',
        tasks: [
          { title: 'AI explains "wabi-sabi" to an American.', desc: 'Some concepts don\'t translate. How does AI with taste handle the untranslatable — without flattening it?', descCn: 'AI向一个美国人解释"侘寂"。有些概念无法翻译。有品味的AI如何处理不可翻译的概念——而不把它压扁？', difficulty: 'REAL', skills: ['The Untranslatable', 'Cultural Footnote'] },
        ]
      },
      {
        id: 'play', name: 'Just for Fun', nameCn: '乐趣', icon: '☼', color: '#d4a43c',
        tasks: [
          { title: 'The Grandma Chatbot', desc: 'Design a chatbot that only speaks in grandmother wisdom. What would it say about crypto? Social media? Space travel?', descCn: '设计一个只用祖母智慧说话的聊天机器人。它会怎么说加密货币？社交媒体？太空旅行？', difficulty: 'FUN', skills: ['Grandma Filter', 'Cultural Footnote'] },
          { title: '3 haikus: human × AI', desc: 'Write 3 haikus about the relationship between humans and AI. One hopeful, one fearful, one absurdly funny.', descCn: '写3首关于人类与AI关系的俳句。一首充满希望，一首充满恐惧，一首荒诞有趣。', difficulty: 'FUN', skills: ['The Poetic Bridge', 'Midnight Philosopher'] },
        ]
      },
      {
        id: 'fusion', name: 'Fusion', nameCn: '融合', icon: '⚗', color: '#6a8eba',
        tasks: [
          { title: 'Impossible Pairing', desc: 'Combine "Silence as Feature" + "Dissent Amplifier." These seem contradictory. Write how they coexist — in 100 words.', descCn: '组合"沉默即功能"+"异见放大器"。它们看似矛盾。用100词写出它们如何共存。', difficulty: 'REAL', skills: ['Silence as Feature', 'Dissent Amplifier'] },
          { title: 'The Third Taste', desc: 'Two taste-skills meet. They create a new one. Give it a name, 3 rules, and explain why it matters.', descCn: '两个品味技能相遇，创造了一个新技能。给它命名、写3条规则，解释它为什么重要。', difficulty: 'REAL', skills: ['Memory Fingerprint', 'Craft Before Scale'] },
        ]
      },
    ];

    /* ── State ── */
    let cardIdCounter = 0;
    let highestZ = 10;
    let activeCard = null;
    let dragState = null;


    /* ── Card Library Management ── */
    function saveCreativeCard(taskTitle, userSolution, skillA, skillB) {
      const card = {
        id: 'card_' + Date.now(),
        taskTitle: taskTitle,
        userSolution: userSolution,
        skillA: skillA,
        skillB: skillB,
        timestamp: Date.now(),
        dateStr: new Date().toLocaleDateString()
      };

      let cards = JSON.parse(localStorage.getItem('42post_creative_cards') || '[]');
      cards.unshift(card); // 添加到开头（最新的卡片在前）
      cards = cards.slice(0, 100); // 最多保存100张卡片
      localStorage.setItem('42post_creative_cards', JSON.stringify(cards));

      displayCardLibrary();
      return card;
    }

    function getCreativeCards() {
      return JSON.parse(localStorage.getItem('42post_creative_cards') || '[]');
    }

    function displayCardLibrary() {
      const cards = getCreativeCards();
      const grid = document.getElementById('libraryGrid');
      const count = document.getElementById('libraryCount');

      if (cards.length === 0) {
        count.textContent = '0 张卡片';
        grid.innerHTML = '<div class="library-empty">暂无创意卡片。在Playground中创建你的第一张卡片吧！</div>';
        return;
      }

      count.textContent = cards.length + ' 张卡片';
      grid.innerHTML = cards.map(card => `
        <div class="library-card">
          <div class="library-card-task">${card.taskTitle}</div>
          <div class="library-card-solution">"${card.userSolution}"</div>
          <div class="library-card-skills">
            <span class="library-card-skill">${card.skillA}</span>
            <span class="library-card-skill">+</span>
            <span class="library-card-skill">${card.skillB}</span>
          </div>
          <div class="library-card-meta">
            <span>${card.dateStr}</span>
          </div>
        </div>
      `).join('');
    }



    /* ── Workspace Tabs & Creations View ── */
    function displayCreations() {
      const cards = getCreativeCards();
      const grid = document.getElementById('creationsGrid');

      if (cards.length === 0) {
        grid.innerHTML = `
          <div class="creations-empty" style="grid-column: 1 / -1;">
            <div class="creations-empty-title">还没有创意作品</div>
            <div class="creations-empty-text">在CREATIVE WORKSPACE中完成创意任务，你的答案将显示在这里</div>
          </div>
        `;
        return;
      }

      grid.innerHTML = cards.map(card => `
        <div class="creation-card">
          <div class="creation-task">${card.taskTitle}</div>
          <div class="creation-task-title">你的答案</div>
          <div class="creation-answer">"${card.userSolution}"</div>
          <div class="creation-skills">
            <span class="creation-skill">✦ ${card.skillA}</span>
            <span style="color:var(--ink-muted);">+</span>
            <span class="creation-skill">✦ ${card.skillB}</span>
          </div>
          <div class="creation-date">${card.dateStr}</div>
        </div>
      `).join('');
    }

    function setupCreationsButton() {
      const btnAllCreations = document.getElementById('btnAllCreations');
      const creationsView = document.getElementById('creationsView');
      
      if (!btnAllCreations) return;
      
      btnAllCreations.addEventListener('click', () => {
        if (creationsView.classList.contains('active')) {
          creationsView.classList.remove('active');
        } else {
          creationsView.classList.add('active');
          displayCreations();
        }
      });
      
      // 点击关闭（在header点击）
      const header = document.querySelector('.creations-header');
      if (header) {
        header.style.cursor = 'pointer';
        header.addEventListener('click', () => {
          creationsView.classList.remove('active');
        });
      
      const btnClose = document.getElementById('btnCloseCreations');
      if (btnClose) {
        btnClose.addEventListener('click', (e) => {
          e.stopPropagation();
          creationsView.classList.remove('active');
        });
      }
      }
    }


    /* ── Build Dock ── */
    function buildDock() {
      const dock = document.getElementById('workshopDock');
      REPOSITORIES.forEach(repo => {
        const item = document.createElement('div');
        item.className = 'dock-item';
        item.style.setProperty('--dock-color', repo.color);
        item.innerHTML = `
          <span class="dock-icon" style="color:${repo.color}">${repo.icon}</span>
          <span>${repo.name}</span>
          <span class="dock-count">${repo.tasks.length}</span>
        `;
        item.addEventListener('click', () => spawnRandomFromRepo(repo));
        dock.appendChild(item);
      });
    }

    /* ── Spawn a task card ── */
    function spawnCard(task, repo) {
      const canvas = document.getElementById('workshopCanvas');
      const empty = document.getElementById('canvasEmpty');
      empty.classList.add('hidden');

      const card = document.createElement('div');
      card.className = 'task-card spawning';
      card.dataset.cardId = ++cardIdCounter;
      card.style.zIndex = ++highestZ;

      // Random position (avoid overlap)
      const maxX = canvas.clientWidth - 340;
      const maxY = canvas.clientHeight - 300;
      const x = 40 + Math.random() * Math.max(maxX - 80, 100);
      const y = 30 + Math.random() * Math.max(maxY - 60, 100);
      card.style.left = x + 'px';
      card.style.top = y + 'px';
      card.style.setProperty('--card-color', repo.color);

      card.innerHTML = `
        <div class="card-header" data-drag-handle>
          <div class="card-header-left">
            <div class="card-domain-dot" style="background:${repo.color}"></div>
            <div class="card-domain-label">${repo.name} / ${repo.nameCn}</div>
          </div>
          <button class="card-close" title="Close">✕</button>
        </div>
        <div class="card-body">
          <div class="card-task-label">TASTE QUESTION</div>
          <div class="card-title">${task.title}</div>
          <div class="card-desc">${task.desc}</div>
          <div class="card-desc" style="color:var(--ink-muted);font-family:var(--font-serif-cn);font-size:11px;margin-top:-6px;">${task.descCn}</div>
          <div class="card-skills-needed">PICK 2 TASTE-SKILLS TO COMBINE / 选择2个品味技能</div>
          <div class="card-fusion-slots">
            <div class="fusion-slot" data-slot="A">
              <div class="fusion-slot-label">SKILL A</div>
              <div class="fusion-slot-hint">click to pick</div>
            </div>
            <div class="fusion-slot" data-slot="B">
              <div class="fusion-slot-label">SKILL B</div>
              <div class="fusion-slot-hint">click to pick</div>
            </div>
          </div>
          <div class="skill-picker"></div>
          <div class="card-skill-tags">
            ${task.skills.map(s => `<span class="card-skill-tag">${s}</span>`).join('')}
          </div>
        </div>
        <div class="card-footer">
          <div class="card-difficulty">${task.difficulty}</div>
          <button class="card-btn-start">OPEN CANVAS ↓</button>
        </div>
        <div class="card-response">
          <textarea placeholder="Write your answer. How would an AI with taste handle this situation?"></textarea>
          <button class="card-btn-submit">⚔ SUBMIT FUSION</button>
          <div class="card-result"></div>
        </div>
      `;

      // ── Skill Fusion Picker ──
      const fusionSlots = card.querySelectorAll('.fusion-slot');
      const picker = card.querySelector('.skill-picker');
      let activeSlot = null;
      const selectedSkills = { A: null, B: null };

      fusionSlots.forEach(slot => {
        slot.addEventListener('click', (e) => {
          e.stopPropagation();
          if (slot.classList.contains('filled')) return;
          activeSlot = slot.dataset.slot;
          picker.innerHTML = ARENA_SKILL_POOL
            .filter(s => s.name !== selectedSkills.A && s.name !== selectedSkills.B)
            .map(s => `<div class="skill-picker-item" data-skill="${s.name}"><div class="spi-name">${s.name}</div><div class="spi-desc">${s.desc}</div></div>`)
            .join('');
          picker.classList.add('open');
        });
      });

      picker.addEventListener('click', (e) => {
        const item = e.target.closest('.skill-picker-item');
        if (!item || !activeSlot) return;
        const skillName = item.dataset.skill;
        selectedSkills[activeSlot] = skillName;
        const slot = card.querySelector(`.fusion-slot[data-slot="${activeSlot}"]`);
        slot.classList.add('filled');
        slot.innerHTML = `<div class="fusion-slot-label">SKILL ${activeSlot}</div><div class="fusion-slot-name">${skillName}</div>`;
        picker.classList.remove('open');
        activeSlot = null;
      });

      // Close picker on outside click
      card.addEventListener('click', (e) => {
        if (!e.target.closest('.fusion-slot') && !e.target.closest('.skill-picker')) {
          picker.classList.remove('open');
        }
      });

      // Close button
      card.querySelector('.card-close').addEventListener('click', (e) => {
        e.stopPropagation();
        card.classList.add('minimizing');
        setTimeout(() => {
          card.remove();
          checkEmpty();
        }, 300);
      });

      // Focus on click
      card.addEventListener('mousedown', () => {
        card.style.zIndex = ++highestZ;
      });

      // Drag
      const handle = card.querySelector('[data-drag-handle]');
      handle.addEventListener('mousedown', (e) => {
        if (e.target.closest('.card-close')) return;
        e.preventDefault();
        card.classList.add('dragging');
        card.style.zIndex = ++highestZ;
        dragState = {
          card,
          startX: e.clientX - card.offsetLeft,
          startY: e.clientY - card.offsetTop,
        };
      });

      // Touch drag
      handle.addEventListener('touchstart', (e) => {
        if (e.target.closest('.card-close')) return;
        const touch = e.touches[0];
        card.classList.add('dragging');
        card.style.zIndex = ++highestZ;
        dragState = {
          card,
          startX: touch.clientX - card.offsetLeft,
          startY: touch.clientY - card.offsetTop,
        };
      }, { passive: true });

      // Open response area
      const startBtn = card.querySelector('.card-btn-start');
      const responseArea = card.querySelector('.card-response');
      startBtn.addEventListener('click', () => {
        const isOpen = responseArea.classList.contains('open');
        responseArea.classList.toggle('open');
        startBtn.textContent = isOpen ? 'OPEN CANVAS ↓' : 'CLOSE CANVAS ↑';
        if (!isOpen) card.style.width = '380px';
        else card.style.width = '320px';
      });

      // Submit response
      const submitBtn = card.querySelector('.card-btn-submit');
      const resultEl = card.querySelector('.card-result');
      submitBtn.addEventListener('click', () => {
        const textarea = card.querySelector('.card-response textarea');
        const text = textarea.value.trim();
        if (!text || text.length < 10) {
          textarea.style.borderColor = '#c0392b';
          setTimeout(() => { textarea.style.borderColor = ''; }, 1000);
          return;
        }

        // Check if 2 skills are selected
        if (!selectedSkills.A || !selectedSkills.B) {
          card.querySelectorAll('.fusion-slot:not(.filled)').forEach(s => {
            s.style.borderColor = '#c0392b';
            setTimeout(() => { s.style.borderColor = ''; }, 1000);
          });
          return;
        }

        submitBtn.textContent = '⚔ CREATING...';
        submitBtn.style.background = 'var(--ink)';
        submitBtn.style.pointerEvents = 'none';

        setTimeout(() => {
          // 保存卡片到localStorage
          saveCreativeCard(task.title, text, selectedSkills.A, selectedSkills.B);

          resultEl.innerHTML = `
            <div style="text-align:center;padding:16px;color:var(--accent-green);">
              <div style="font-size:14px;font-weight:700;margin-bottom:8px;">✓ 已保存到"我的创意作品"</div>
              <div style="font-size:11px;color:var(--ink-muted);">点击顶部"MY CREATIONS"查看你的所有作品</div>
            </div>
          `;
          resultEl.classList.add('visible');

          submitBtn.textContent = '✓ SAVED';
          submitBtn.style.background = 'var(--accent-green)';
          setTimeout(() => {
            submitBtn.textContent = '⚔ SUBMIT FUSION';
            submitBtn.style.background = '';
            submitBtn.style.pointerEvents = '';
          }, 3000);
        }, 800);
      });

      canvas.appendChild(card);

      // Remove spawn animation class
      setTimeout(() => card.classList.remove('spawning'), 350);
    }

    /* ── Spawn random from repo ── */
    function spawnRandomFromRepo(repo) {
      const task = repo.tasks[Math.floor(Math.random() * repo.tasks.length)];
      spawnCard(task, repo);
    }

    /* ── Global drag handlers ── */
    document.addEventListener('mousemove', (e) => {
      if (!dragState) return;
      const { card, startX, startY } = dragState;
      card.style.left = (e.clientX - startX) + 'px';
      card.style.top = (e.clientY - startY) + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (dragState) {
        dragState.card.classList.remove('dragging');
        dragState = null;
      }
    });

    document.addEventListener('touchmove', (e) => {
      if (!dragState) return;
      const touch = e.touches[0];
      const { card, startX, startY } = dragState;
      card.style.left = (touch.clientX - startX) + 'px';
      card.style.top = (touch.clientY - startY) + 'px';
    }, { passive: true });

    document.addEventListener('touchend', () => {
      if (dragState) {
        dragState.card.classList.remove('dragging');
        dragState = null;
      }
    });

    /* ── Check if canvas is empty ── */
    function checkEmpty() {
      const canvas = document.getElementById('workshopCanvas');
      const cards = canvas.querySelectorAll('.task-card');
      const empty = document.getElementById('canvasEmpty');
      if (cards.length === 0) {
        empty.classList.remove('hidden');
      }
    }

    /* ── Clear All ── */
    document.getElementById('btnClearAll').addEventListener('click', () => {
      const canvas = document.getElementById('workshopCanvas');
      const cards = canvas.querySelectorAll('.task-card');
      cards.forEach((card, i) => {
        setTimeout(() => {
          card.classList.add('minimizing');
          setTimeout(() => card.remove(), 300);
        }, i * 60);
      });
      setTimeout(checkEmpty, cards.length * 60 + 400);
    });

    /* ── Random Task ── */
    document.getElementById('btnRandomTask').addEventListener('click', () => {
      const repo = REPOSITORIES[Math.floor(Math.random() * REPOSITORIES.length)];
      spawnRandomFromRepo(repo);
    });

    /* ── Init ── */
    buildDock();
    setupCreationsButton();
    displayCardLibrary();
  </script>


  <!-- MY CREATIONS View -->
  <div class="creations-view" id="creationsView">
    <div class="creations-header">
    <button class="creations-close" id="btnCloseCreations">✕</button>
    <div class="creations-title">🎴 我的创意作品</div>
      <div class="creations-subtitle">我的所有创意答案汇总</div>
    </div>
    <div class="creations-container">
      <div class="creations-grid" id="creationsGrid">
        <!-- 卡片将被动态插入 -->
      </div>
    </div>
  </div>

</body>
</html>
