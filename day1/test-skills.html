<!DOCTYPE html>
<html>
<head>
  <title>Test SHARED_SKILLS</title>
</head>
<body>
  <h1>Testing SHARED_SKILLS Loading</h1>
  <div id="result"></div>
  
  <script src="skills.js"></script>
  <script>
    const result = document.getElementById('result');
    if (typeof SHARED_SKILLS !== 'undefined' && SHARED_SKILLS.length > 0) {
      result.innerHTML = `<p style="color: green;">✓ SHARED_SKILLS loaded successfully!</p>
        <p>Total skills: ${SHARED_SKILLS.length}</p>
        <p>First skill: ${SHARED_SKILLS[0].title}</p>`;
    } else {
      result.innerHTML = `<p style="color: red;">✗ SHARED_SKILLS not loaded</p>
        <p>Type: ${typeof SHARED_SKILLS}</p>`;
    }
  </script>
</body>
</html>
